<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Format Painter">
<rect width="32" height="32" fill="none"/>
<!-- Brush head (top box, yellow/gold accent) -->
<rect fill="#ffb900" stroke="#242424" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" x="7" y="7" width="18" height="6" rx="1.25"/>
<!-- Green accent line inside brush head -->
<path fill="none" stroke="#107c41" stroke-width="1.0" stroke-linecap="round" d="M9 10h14"/>
<!-- Ferrule (connector band) -->
<rect fill="none" stroke="#242424" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" x="10" y="13" width="12" height="4"/>
<!-- Handle (tapered shaft going down) -->
<path fill="none" stroke="#242424" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round" d="M13 17h6l-1 9h-4z"/>
</svg>
