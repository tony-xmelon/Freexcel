name: Tester Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release version override, for example 0.5
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean
      release_notes:
        description: Optional tester-facing release notes to append to the generated notes
        required: false
        type: string
      public_preview_candidate:
        description: Promote this build as a public-preview candidate only when all accessibility gate inputs are true
        required: true
        default: false
        type: boolean
      accessibility_keyboard_only:
        description: Keyboard-only smoke validation was recorded
        required: true
        default: false
        type: boolean
      accessibility_screen_reader:
        description: Screen-reader smoke validation was recorded
        required: true
        default: false
        type: boolean
      accessibility_uia_catalog:
        description: UI Automation catalog review was recorded
        required: true
        default: false
        type: boolean
      accessibility_known_issues:
        description: Known accessibility issues were reviewed and listed, or explicitly marked none
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build tester release
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Repository preflight
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File tools\Test-RepositoryPreflight.ps1

      - name: Restore
        shell: pwsh
        run: dotnet restore FreeX.slnx

      - name: Build
        shell: pwsh
        run: dotnet build FreeX.slnx --configuration Release --no-restore --disable-build-servers -p:UseSharedCompilation=false -p:NodeReuse=false /nr:false -m:1

      - name: Test
        shell: pwsh
        run: dotnet test FreeX.slnx --configuration Release --no-build --logger "trx;LogFileName=tests.trx" --disable-build-servers -p:UseSharedCompilation=false -p:NodeReuse=false /nr:false -m:1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: freex-${{ github.run_id }}-${{ github.run_attempt }}-test-results
          path: "**/TestResults/tests.trx"
          if-no-files-found: warn

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $runNumber = [int]$env:GITHUB_RUN_NUMBER
          $runAttempt = [int]$env:GITHUB_RUN_ATTEMPT
          $versionLabel = "${{ inputs.release_version }}"
          if ([string]::IsNullOrWhiteSpace($versionLabel)) {
            $progressPath = "release/progress.json"
            if (-not (Test-Path -LiteralPath $progressPath)) {
              throw "Could not read release progress metadata from $progressPath"
            }

            $releaseProgress = Get-Content -LiteralPath $progressPath -Raw | ConvertFrom-Json
            foreach ($propertyName in @("major", "overallCompletion", "releasePatchBase", "releasePatchSource", "channel")) {
              if (-not $releaseProgress.PSObject.Properties.Name.Contains($propertyName)) {
                throw "release/progress.json is missing required property '$propertyName'."
              }
            }

            if ($releaseProgress.releasePatchSource -ne "github_run_number") {
              throw "Unsupported releasePatchSource '$($releaseProgress.releasePatchSource)'."
            }

            $major = [int]$releaseProgress.major
            $overallCompletion = [int]$releaseProgress.overallCompletion
            $releasePatchBase = [int]$releaseProgress.releasePatchBase
            $channel = [string]$releaseProgress.channel
            if ($major -lt 0) {
              throw "release/progress.json major must be non-negative."
            }
            if ($overallCompletion -lt 0 -or $overallCompletion -gt 100) {
              throw "release/progress.json overallCompletion must be between 0 and 100."
            }
            if ($releasePatchBase -lt 0) {
              throw "release/progress.json releasePatchBase must be non-negative."
            }
            if ($channel -ne "test") {
              throw "Unsupported release channel '$channel'."
            }

            if ($overallCompletion -ge 99) { $minor = 9 }
            elseif ($overallCompletion -ge 95) { $minor = 8 }
            elseif ($overallCompletion -ge 93) { $minor = 7 }
            elseif ($overallCompletion -ge 90) { $minor = 6 }
            else { $minor = 5 }
            $releasePatch = $releasePatchBase + $runNumber
            $versionLabel = "$major.$minor.$releasePatch"
          }
          if ($versionLabel -match "[`r`n]") {
            throw "Release version must be a single line."
          }

          $versionSlug = $versionLabel.ToLowerInvariant()
          $versionSlug = $versionSlug -replace '^version\s+', ''
          $versionSlug = $versionSlug -replace '[^a-z0-9]+', '-'
          $versionSlug = $versionSlug.Trim('-')
          if ([string]::IsNullOrWhiteSpace($versionSlug)) {
            throw "Release version produced an empty slug."
          }

          $shortSha = git rev-parse --short=8 HEAD
          $releaseStamp = Get-Date -AsUTC -Format "yyyy-MM-dd-HH-mm-ss"
          $releaseId = "$versionSlug-$releaseStamp-run$runNumber-attempt$runAttempt"
          $tag = "v$releaseId+$shortSha"
          $displayVersion = $versionLabel.Trim()
          if ($displayVersion -notmatch '^[vV]') {
            $displayVersion = "v$displayVersion"
          }
          $releaseName = "FreeX (Test Release) $displayVersion ($releaseStamp) Run $runNumber Attempt $runAttempt ($shortSha)"

          "version=$versionLabel" >> $env:GITHUB_OUTPUT
          "version_slug=$versionSlug" >> $env:GITHUB_OUTPUT
          "release_id=$releaseId" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT

      - name: Publish single-file tester exe
        shell: pwsh
        run: |
          $outputRoot = Join-Path $env:RUNNER_TEMP "freex-release"
          New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null
          tools/Publish-UserTestBuild.ps1 `
            -Configuration Release `
            -RuntimeIdentifier win-x64 `
            -OutputRoot $outputRoot `
            -Version "${{ steps.meta.outputs.version }}" `
            -PublishMode SingleFile

          $versionedExe = Get-ChildItem -LiteralPath $outputRoot -Filter "freex-*-win-x64-singlefile.exe" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $versionedExe) {
            throw "Publish script did not create a versioned single-file exe."
          }

          $uploadRoot = Join-Path $env:GITHUB_WORKSPACE "artifacts\upload"
          New-Item -ItemType Directory -Force -Path $uploadRoot | Out-Null
          Copy-Item -LiteralPath $versionedExe.FullName -Destination (Join-Path $uploadRoot $versionedExe.Name) -Force
          $latestExePath = Join-Path $uploadRoot "FreeX-latest-win-x64.exe"
          Copy-Item -LiteralPath $versionedExe.FullName -Destination $latestExePath -Force

          $versionedHashPath = "$($versionedExe.FullName).sha256"
          if (-not (Test-Path -LiteralPath $versionedHashPath)) {
            throw "Publish script did not create a versioned single-file exe checksum."
          }

          Copy-Item -LiteralPath $versionedHashPath -Destination (Join-Path $uploadRoot "$($versionedExe.Name).sha256") -Force
          $latestHash = Get-FileHash -LiteralPath $latestExePath -Algorithm SHA256
          Set-Content -LiteralPath "$latestExePath.sha256" -Value "$($latestHash.Hash.ToLowerInvariant())  FreeX-latest-win-x64.exe" -Encoding ASCII

      - name: Publish MSIX package
        shell: pwsh
        run: |
          $outputRoot = Join-Path $env:RUNNER_TEMP "freex-release"
          $certificatePath = ""
          $certificateBase64 = "${{ secrets.FREEX_MSIX_CERTIFICATE_BASE64 }}"
          if (-not [string]::IsNullOrWhiteSpace($certificateBase64)) {
            $certificatePath = Join-Path $env:RUNNER_TEMP "freex-msix-signing.pfx"
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($certificateBase64))
          }

          $signArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($certificatePath)) {
            $signArgs += @("-MsixCertificatePath", $certificatePath)
            $certificatePassword = "${{ secrets.FREEX_MSIX_CERTIFICATE_PASSWORD }}"
            if (-not [string]::IsNullOrWhiteSpace($certificatePassword)) {
              $signArgs += @("-MsixCertificatePassword", $certificatePassword)
            }
            $timestampUrl = "${{ vars.FREEX_MSIX_TIMESTAMP_URL }}"
            if (-not [string]::IsNullOrWhiteSpace($timestampUrl)) {
              $signArgs += @("-MsixTimestampUrl", $timestampUrl)
            }
          }

          tools/Publish-UserTestBuild.ps1 `
            -Configuration Release `
            -RuntimeIdentifier win-x64 `
            -OutputRoot $outputRoot `
            -Version "${{ steps.meta.outputs.version }}" `
            -PublishMode Msix `
            @signArgs

          $versionedMsix = Get-ChildItem -LiteralPath $outputRoot -Filter "freex-*-win-x64-msix.msix" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $versionedMsix) {
            throw "Publish script did not create a versioned MSIX."
          }

          $uploadRoot = Join-Path $env:GITHUB_WORKSPACE "artifacts\upload"
          New-Item -ItemType Directory -Force -Path $uploadRoot | Out-Null
          Copy-Item -LiteralPath $versionedMsix.FullName -Destination (Join-Path $uploadRoot $versionedMsix.Name) -Force
          $latestMsixPath = Join-Path $uploadRoot "FreeX-latest-win-x64.msix"
          Copy-Item -LiteralPath $versionedMsix.FullName -Destination $latestMsixPath -Force

          $versionedHashPath = "$($versionedMsix.FullName).sha256"
          if (-not (Test-Path -LiteralPath $versionedHashPath)) {
            throw "Publish script did not create a versioned MSIX checksum."
          }

          Copy-Item -LiteralPath $versionedHashPath -Destination (Join-Path $uploadRoot "$($versionedMsix.Name).sha256") -Force
          $latestHash = Get-FileHash -LiteralPath $latestMsixPath -Algorithm SHA256
          Set-Content -LiteralPath "$latestMsixPath.sha256" -Value "$($latestHash.Hash.ToLowerInvariant())  FreeX-latest-win-x64.msix" -Encoding ASCII

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v7
        with:
          name: freex-${{ steps.meta.outputs.release_id }}-${{ steps.meta.outputs.short_sha }}-win-x64-singlefile
          path: artifacts/upload/freex-*-win-x64-singlefile.exe
          if-no-files-found: error

      - name: Upload latest artifact
        uses: actions/upload-artifact@v7
        with:
          name: FreeX-latest-win-x64.exe
          path: artifacts/upload/FreeX-latest-win-x64.exe
          if-no-files-found: error

      - name: Upload EXE checksum artifacts
        uses: actions/upload-artifact@v7
        with:
          name: freex-${{ steps.meta.outputs.release_id }}-${{ steps.meta.outputs.short_sha }}-win-x64-singlefile-sha256
          path: artifacts/upload/*.exe.sha256
          if-no-files-found: error

      - name: Upload versioned MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: freex-${{ steps.meta.outputs.release_id }}-${{ steps.meta.outputs.short_sha }}-win-x64-msix
          path: artifacts/upload/freex-*-win-x64-msix.msix
          if-no-files-found: error

      - name: Upload latest MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: FreeX-latest-win-x64.msix
          path: artifacts/upload/FreeX-latest-win-x64.msix
          if-no-files-found: error

      - name: Upload MSIX checksum artifacts
        uses: actions/upload-artifact@v7
        with:
          name: freex-${{ steps.meta.outputs.release_id }}-${{ steps.meta.outputs.short_sha }}-win-x64-msix-sha256
          path: artifacts/upload/*.msix.sha256
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          FREEX_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $title = "${{ steps.meta.outputs.release_name }}"
          $publicPreviewCandidate = "${{ inputs.public_preview_candidate }}" -eq "true"
          $accessibilityGate = [ordered]@{
            "Keyboard-only smoke validation" = "${{ inputs.accessibility_keyboard_only }}" -eq "true"
            "Screen-reader smoke validation" = "${{ inputs.accessibility_screen_reader }}" -eq "true"
            "UI Automation catalog review" = "${{ inputs.accessibility_uia_catalog }}" -eq "true"
            "Known accessibility issues reviewed/listed" = "${{ inputs.accessibility_known_issues }}" -eq "true"
          }

          $missingAccessibilityGate = @(
            foreach ($item in $accessibilityGate.GetEnumerator()) {
              if (-not $item.Value) { $item.Key }
            }
          )
          if ($publicPreviewCandidate -and $missingAccessibilityGate.Count -gt 0) {
            throw "Public-preview promotion requires completed accessibility gate inputs: $($missingAccessibilityGate -join ', ')."
          }

          function Format-GateStatus {
            param([bool]$Complete)
            if ($Complete) { return "recorded" }
            return "missing"
          }

          $keyboardOnlyStatus = Format-GateStatus $accessibilityGate["Keyboard-only smoke validation"]
          $screenReaderStatus = Format-GateStatus $accessibilityGate["Screen-reader smoke validation"]
          $uiaCatalogStatus = Format-GateStatus $accessibilityGate["UI Automation catalog review"]
          $knownIssuesStatus = Format-GateStatus $accessibilityGate["Known accessibility issues reviewed/listed"]
          $promotionStatus = if ($publicPreviewCandidate) {
            "All public-preview accessibility gate inputs were completed; this build is public-preview eligible."
          } else {
            "This build is internal-only unless release notes separately document a completed public-preview accessibility gate."
          }

          $notes = @"
          Tester build for FreeX.

          Commit: ${{ github.sha }}
          Download the stable latest asset: FreeX-latest-win-x64.exe
          Checksum for the latest single-file asset: FreeX-latest-win-x64.exe.sha256
          MSIX package: FreeX-latest-win-x64.msix
          Checksum for the latest MSIX package: FreeX-latest-win-x64.msix.sha256

          This is a framework-dependent single-file Windows x64 build. It requires the Microsoft .NET Desktop Runtime if Windows prompts for it.
          The MSIX package is signed when the release workflow has certificate secrets configured; otherwise it remains unsigned for local packaging validation. Installer trust validation and Store submission remain release-gate tasks.

          Public-preview accessibility gate:
          - Keyboard-only smoke validation: $keyboardOnlyStatus.
          - Screen-reader smoke validation: $screenReaderStatus.
          - UI Automation catalog review: $uiaCatalogStatus.
          - Known accessibility issues reviewed/listed: $knownIssuesStatus.

          $promotionStatus
          "@
          $extraNotes = $env:FREEX_RELEASE_NOTES
          if (-not [string]::IsNullOrWhiteSpace($extraNotes)) {
            $notes = $notes.TrimEnd() + @"


          Additional tester notes:

          $extraNotes
          "@
          }

          $releaseExists = $false
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          $prereleaseArgs = @()
          if ("${{ inputs.prerelease }}" -eq "true") {
            $prereleaseArgs += "--prerelease"
          }

          $latestArgs = @()
          if ("${{ inputs.prerelease }}" -ne "true") {
            $latestArgs += "--latest"
          }

          $assetPaths = @(
            "artifacts/upload/*.exe",
            "artifacts/upload/*.exe.sha256",
            "artifacts/upload/*.msix",
            "artifacts/upload/*.msix.sha256"
          )

          if ($releaseExists) {
            gh release upload $tag @assetPaths --clobber
            gh release edit $tag --title $title --notes $notes @prereleaseArgs @latestArgs
          } else {
            gh release create $tag @assetPaths --target $env:GITHUB_SHA --title $title --notes $notes --draft @prereleaseArgs
            gh release edit $tag --draft=false @latestArgs
          }
