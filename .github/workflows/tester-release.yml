name: Tester Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release version override, for example 0.5-phase-5
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build tester release
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore Freexcel.slnx

      - name: Build
        shell: pwsh
        run: dotnet build Freexcel.slnx --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test Freexcel.slnx --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $appInfo = Get-Content -LiteralPath "src/Freexcel.App.Host/AppInfo.cs" -Raw
          $versionMatch = [regex]::Match($appInfo, 'VersionText\s*=\s*"(?<version>[^"]+)"')
          if (-not $versionMatch.Success) {
            throw "Could not read VersionText from AppInfo.cs"
          }

          $version = "${{ inputs.release_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $versionMatch.Groups["version"].Value
          }

          $versionSlug = $version.ToLowerInvariant()
          $versionSlug = $versionSlug -replace '^version\s+', ''
          $versionSlug = $versionSlug -replace '[^a-z0-9]+', '-'
          $versionSlug = $versionSlug.Trim('-')
          if ([string]::IsNullOrWhiteSpace($versionSlug)) {
            throw "Release version produced an empty slug."
          }

          $shortSha = git rev-parse --short=8 HEAD
          $tag = "v$versionSlug+$shortSha"
          $releaseName = "Freexcel $version ($shortSha)"

          "version=$version" >> $env:GITHUB_OUTPUT
          "version_slug=$versionSlug" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT

      - name: Publish single-file tester exe
        shell: pwsh
        run: |
          $outputRoot = Join-Path $env:RUNNER_TEMP "freexcel-release"
          New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null
          tools/Publish-UserTestBuild.ps1 `
            -Configuration Release `
            -RuntimeIdentifier win-x64 `
            -OutputRoot $outputRoot `
            -Version "${{ steps.meta.outputs.version }}" `
            -PublishMode SingleFile

          $versionedExe = Get-ChildItem -LiteralPath $outputRoot -Filter "freexcel-*-win-x64-singlefile.exe" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $versionedExe) {
            throw "Publish script did not create a versioned single-file exe."
          }

          $uploadRoot = Join-Path $env:GITHUB_WORKSPACE "artifacts\upload"
          New-Item -ItemType Directory -Force -Path $uploadRoot | Out-Null
          Copy-Item -LiteralPath $versionedExe.FullName -Destination (Join-Path $uploadRoot $versionedExe.Name) -Force
          Copy-Item -LiteralPath $versionedExe.FullName -Destination (Join-Path $uploadRoot "Freexcel-latest-win-x64.exe") -Force

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: freexcel-${{ steps.meta.outputs.version_slug }}-${{ steps.meta.outputs.short_sha }}-win-x64-singlefile
          path: artifacts/upload/freexcel-*-win-x64-singlefile.exe
          if-no-files-found: error

      - name: Upload latest artifact
        uses: actions/upload-artifact@v4
        with:
          name: Freexcel-latest-win-x64.exe
          path: artifacts/upload/Freexcel-latest-win-x64.exe
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $title = "${{ steps.meta.outputs.release_name }}"
          $notes = @"
          Tester build for Freexcel.

          Commit: ${{ github.sha }}
          Download the stable latest asset: Freexcel-latest-win-x64.exe

          This is a framework-dependent single-file Windows x64 build. It requires the Microsoft .NET Desktop Runtime if Windows prompts for it.
          "@

          $releaseExists = $false
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          $prereleaseArgs = @()
          if ("${{ inputs.prerelease }}" -eq "true") {
            $prereleaseArgs += "--prerelease"
          }

          if ($releaseExists) {
            gh release edit $tag --title $title --notes $notes @prereleaseArgs
          } else {
            gh release create $tag --target $env:GITHUB_SHA --title $title --notes $notes @prereleaseArgs
          }

          gh release upload $tag artifacts/upload/*.exe --clobber
